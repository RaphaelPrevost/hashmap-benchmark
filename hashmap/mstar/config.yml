name: mstar
display_name: M*DICT (C)

source:
  type: github-raw
  repo: P-p-H-d/mlib
  ref: master   # later: replace with pinned commit hash
  files:
    - m-core.h
    - m-array.h
    - m-string.h
    - m-dict.h

build:
  system: cc
  compiler: cc
  cflags:
    - -O3
    - -DNDEBUG
    - -std=c11
    - -W
    - -Wall
    - -Wpointer-arith
  include_dirs:
    - .
  sources:
    - benchmark.c
  output: hashbench
