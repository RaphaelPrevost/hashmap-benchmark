name: verstable
display_name: Verstable (C)

source:
  type: github-raw
  repo: JacksonAllan/Verstable
  ref: master   # later: replace with pinned commit hash
  files:
    - verstable.h

build:
  system: cc
  compiler: cc
  cflags:
    - -O3
    - -DNDEBUG
    - -std=c11
    - -W
    - -Wall
    - -Wpointer-arith
  include_dirs:
    - .
  sources:
    - benchmark.c
  output: hashbench
